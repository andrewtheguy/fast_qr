name: Publish

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version from workspace Cargo.toml
        id: version
        run: |
          set -euo pipefail
          if ! command -v jq >/dev/null 2>&1; then
            echo "jq is required but not installed" >&2
            exit 1
          fi
          metadata=$(cargo metadata --no-deps --format-version 1)
          version=$(printf '%s' "$metadata" | jq -r '.packages[] | select(.name=="fast-qr-reworked") | .version')
          if [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "Failed to extract version from cargo metadata" >&2
            exit 1
          fi
          tag="v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Block if release already exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists" >&2
            exit 1
          fi

  build-wasm:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: fast-qr-wasm/package-lock.json

      - uses: Swatinem/rust-cache@v2

      - run: npm ci
        working-directory: fast-qr-wasm

      - run: npm run build
        working-directory: fast-qr-wasm

      - run: npm pack
        working-directory: fast-qr-wasm/pkg

      - uses: actions/upload-artifact@v4
        with:
          name: wasm-pkg
          path: fast-qr-wasm/pkg/*.tgz
          if-no-files-found: error

  build-cli:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
            bin: fast-qr-cli
            archive_ext: tar.gz
          - os: ubuntu-24.04-arm
            target: linux-arm64
            bin: fast-qr-cli
            archive_ext: tar.gz
          - os: macos-latest
            target: macos-arm64
            bin: fast-qr-cli
            archive_ext: tar.gz
          - os: windows-latest
            target: windows-amd64
            bin: fast-qr-cli.exe
            archive_ext: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2

      - run: cargo build -p fast-qr-cli --release

      - name: Package binary
        shell: bash
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          TARGET: ${{ matrix.target }}
          BIN: ${{ matrix.bin }}
          EXT: ${{ matrix.archive_ext }}
        run: |
          archive="fast-qr-cli-${TAG}-${TARGET}.${EXT}"
          if [[ "${EXT}" == "zip" ]]; then
            (cd target/release && 7z a "../../${archive}" "${BIN}")
          else
            tar -C target/release -czvf "${archive}" "${BIN}"
          fi
          echo "ARCHIVE=${archive}" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error

  publish:
    needs: [prepare, build-wasm, build-cli]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create draft release and upload artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --draft \
            --generate-notes
          gh release upload "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            dist/*

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          gh release edit "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --draft=false
